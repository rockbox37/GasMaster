name: gasmaster
description: Calculate, track, chart, and share gas mileage for vehicles.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.4.0
  intl: ^0.19.0
  fl_chart: ^0.69.0
  shared_preferences: ^2.3.2
  share_plus: ^10.0.0
  path_provider: ^2.1.4
  path: ^1.9.0
  flutter_native_splash: ^2.4.7
  image_picker: ^1.2.2
  image: ^4.8.0
  package_info_plus: ^9.0.1
  file_picker: ^11.0.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  app_badge_plus: ^1.2.2
  # Optional (uncomment after flutterfire configure)
  # firebase_core: ^3.6.0
  # firebase_auth: ^5.3.0
  # cloud_firestore: ^5.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
  image_path: assets/branding/icon.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/branding/icon.png

flutter_native_splash:
  color: "#000000"
  color_dark: "#000000"
  image: assets/branding/logo.png
  image_dark: assets/branding/logo.png
  android: true
  ios: true
  web: false
  android_12:
    color: "#000000"
    color_dark: "#000000"
    image: assets/branding/logo.png
    image_dark: assets/branding/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
