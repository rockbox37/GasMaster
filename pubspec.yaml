name: gasmaster
description: Calculate, track, chart, and share gas mileage for vehicles.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.4.0
  intl: ^0.19.0
  fl_chart: ^0.69.0
  shared_preferences: ^2.3.2
  share_plus: ^10.0.0
  path_provider: ^2.1.4
  # Optional (uncomment after flutterfire configure)
  # firebase_core: ^3.6.0
  # firebase_auth: ^5.3.0
  # cloud_firestore: ^5.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
